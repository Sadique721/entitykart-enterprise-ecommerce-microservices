# ─────────────────────────────────────────────────────────────────────────────
# EntityKart – Docker Compose
# Updated 2026-06-26: Merged api-gateway + discovery-server + common-service
#                      + notification-service → single "common-services" container
# ─────────────────────────────────────────────────────────────────────────────
#
# Service Port Map (host → container):
#   common-services  : 9900 → 9900  (Eureka dashboard + Gateway + Notification)
#   user-service     : 9081 → 8081
#   product-service  : 9082 → 8082
#   cart-service     : 9083 → 8083
#   order-service    : 9084 → 8084
#   payment-service  : 9085 → 8085
#   wishlist-service : 9086 → 8086
#   review-service   : 9087 → 8087
#   return-service   : 9088 → 8088
#   zookeeper        : 19090 → 2181
#   kafka            : 19092 → 9092
# ─────────────────────────────────────────────────────────────────────────────

x-common-env: &common-env
  DB_HOST: ${DB_HOST}
  DB_PORT: ${DB_PORT}
  DB_USERNAME: ${DB_USERNAME}
  DB_PASSWORD: ${DB_PASSWORD}
  SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE: 2
  SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
  # All microservices now register with common-services (Eureka Server)
  EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://common-services:9900/eureka/

services:

  # ── Infrastructure ──────────────────────────────────────────────────────────

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper_entitykart
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "19090:2181"
    healthcheck:
      test: ["CMD", "bash", "-c", "echo ruok | nc localhost 2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka_entitykart
    depends_on:
      zookeeper:
        condition: service_healthy
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:19290
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    ports:
      - "19092:9092"
      - "19290:29092"
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 10

  # ── Common Services (Merged: api-gateway + discovery-server + ───────────────
  # ──                          common-service + notification-service)  ─────────

  common-services:
    build: ./common-services
    container_name: common-services_entitykart
    ports:
      - "9900:9900"   # Eureka Dashboard + Gateway + Notification REST
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      SERVER_PORT: 9900
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: notification_service
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      JWT_SECRET: ${JWT_SECRET}
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      APP_URL: ${APP_URL}
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://localhost:9900/actuator/health"]
      interval: 20s
      timeout: 10s
      retries: 10
    restart: on-failure

  # ── Business Microservices ──────────────────────────────────────────────────

  user-service:
    build: ./user-service
    container_name: user-service_entitykart
    ports:
      - "9081:8081"
    depends_on:
      kafka:
        condition: service_healthy
      common-services:
        condition: service_healthy
    environment:
      <<: *common-env
      DB_NAME: user_service
      SERVER_PORT: 8081
      JWT_SECRET: ${JWT_SECRET}
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      APP_URL: ${APP_URL}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET}
    restart: on-failure

  product-service:
    build: ./product-service
    container_name: product-service_entitykart
    ports:
      - "9082:8082"
    depends_on:
      kafka:
        condition: service_healthy
      common-services:
        condition: service_healthy
    environment:
      <<: *common-env
      DB_NAME: product_service
      SERVER_PORT: 8082
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET}
    restart: on-failure

  cart-service:
    build: ./cart-service
    container_name: cart-service_entitykart
    ports:
      - "9083:8083"
    depends_on:
      kafka:
        condition: service_healthy
      common-services:
        condition: service_healthy
    environment:
      <<: *common-env
      DB_NAME: cart_service
      SERVER_PORT: 8083
    restart: on-failure

  order-service:
    build: ./order-service
    container_name: order-service_entitykart
    ports:
      - "9084:8084"
    depends_on:
      kafka:
        condition: service_healthy
      common-services:
        condition: service_healthy
    environment:
      <<: *common-env
      DB_NAME: order_service
      SERVER_PORT: 8084
    restart: on-failure

  payment-service:
    build: ./payment-service
    container_name: payment-service_entitykart
    ports:
      - "9085:8085"
    depends_on:
      kafka:
        condition: service_healthy
      common-services:
        condition: service_healthy
      order-service:
        condition: service_started
    environment:
      <<: *common-env
      DB_NAME: payment_service
      SERVER_PORT: 8085
      AUTHORIZE_NET_API_LOGIN_ID: ${AUTHORIZE_NET_API_LOGIN_ID}
      AUTHORIZE_NET_TRANSACTION_KEY: ${AUTHORIZE_NET_TRANSACTION_KEY}
      AUTHORIZE_NET_ENVIRONMENT: ${AUTHORIZE_NET_ENVIRONMENT}
    restart: on-failure

  wishlist-service:
    build: ./wishlist-service
    container_name: wishlist-service_entitykart
    ports:
      - "9086:8086"
    depends_on:
      common-services:
        condition: service_healthy
    environment:
      <<: *common-env
      DB_NAME: wishlist_service
      SERVER_PORT: 8086
    restart: on-failure

  review-service:
    build: ./review-service
    container_name: review-service_entitykart
    ports:
      - "9087:8087"
    depends_on:
      common-services:
        condition: service_healthy
    environment:
      <<: *common-env
      DB_NAME: review_service
      SERVER_PORT: 8087
    restart: on-failure

  return-service:
    build: ./return-service
    container_name: return-service_entitykart
    ports:
      - "9088:8088"
    depends_on:
      kafka:
        condition: service_healthy
      common-services:
        condition: service_healthy
      order-service:
        condition: service_started
      payment-service:
        condition: service_started
    environment:
      <<: *common-env
      DB_NAME: return_service
      SERVER_PORT: 8088
    restart: on-failure
