# ============================================================
#  Common Services — Merged: API-Gateway + Discovery-Server
#                            + Common-Service + Notification-Service
#  Port Layout:
#    9900 → Eureka Discovery Server (main HTTP port)
#    The gateway & notification REST run inside the same process
#    on port 9900 via Spring MVC (non-reactive paths) or 9901
#    if overridden. Set SERVER_PORT=9900 in env.
# ============================================================
server:
  port: ${SERVER_PORT:9900}

spring:
  application:
    name: common-services
  main:
    web-application-type: servlet

  # ── Multipart (for gateway file-upload passthrough) ──────────────────────
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  # ── Database (Notification entity persistence) ───────────────────────────
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:defaultdb}?useSSL=true&requireSSL=true&trustServerCertificate=true
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:0721}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect

  # ── Kafka (Notification consumers) ──────────────────────────────────────
  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: common-services-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: >
          com.entitykart.orderservice.dto,
          com.entitykart.paymentservice.dto,
          com.entitykart.returnservice.dto,
          com.entitykart.commonservices.notification.dto
        spring.json.use.type.headers: false
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false

  # ── Email / SMTP ─────────────────────────────────────────────────────────
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
        connectiontimeout: 5000
        timeout: 3000
        writetimeout: 5000

  # ── Spring Cloud Gateway Routes ──────────────────────────────────────────
  cloud:
    gateway:
      mvc:
        routes:
          # ── User Service ───────────────────────────────────────────────────
          - id: user-service
            uri: lb://user-service
            predicates:
              - Path=/api/users,/api/users/**

          # ── Product Service ────────────────────────────────────────────────
          - id: product-service-products
            uri: lb://product-service
            predicates:
              - Path=/api/products,/api/products/**

          # ── Category Service (part of product-service) ─────────────────────
          - id: product-service-categories
            uri: lb://product-service
            predicates:
              - Path=/api/categories,/api/categories/**

          # ── Cart Service ───────────────────────────────────────────────────
          - id: cart-service
            uri: lb://cart-service
            predicates:
              - Path=/api/cart,/api/cart/**

          # ── Order Service ──────────────────────────────────────────────────
          - id: order-service
            uri: lb://order-service
            predicates:
              - Path=/api/orders,/api/orders/**

          # ── Payment Service ────────────────────────────────────────────────
          - id: payment-service
            uri: lb://payment-service
            predicates:
              - Path=/api/payments,/api/payments/**

          # ── Wishlist Service ───────────────────────────────────────────────
          - id: wishlist-service
            uri: lb://wishlist-service
            predicates:
              - Path=/api/wishlist,/api/wishlist/**

          # ── Review Service (public GET + admin) ───────────────────────────
          - id: review-service
            uri: lb://review-service
            predicates:
              - Path=/api/reviews,/api/reviews/**,/api/admin/reviews,/api/admin/reviews/**

          # ── Return Service ─────────────────────────────────────────────────
          - id: return-service
            uri: lb://return-service
            predicates:
              - Path=/api/returns,/api/returns/**,/api/admin/returns,/api/admin/returns/**

          # ── Admin Notifications & Export — served locally (no lb routing) ──
          # These endpoints live inside common-services itself; no forwarding needed.
          # Spring MVC will handle /api/admin/notifications/** and /api/admin/export/**
          # directly via NotificationController and AdminExportController.
          # DO NOT add lb routes for them — they will loop.


# ── Eureka Server (self – Discovery) ────────────────────────────────────────
eureka:
  instance:
    hostname: ${EUREKA_HOSTNAME:localhost}
    prefer-ip-address: true
  client:
    # This service IS the Eureka server – do not register with itself
    register-with-eureka: false
    fetch-registry: true
    service-url:
      defaultZone: http://${eureka.instance.hostname}:${SERVER_PORT:9900}/eureka/
  server:
    wait-time-in-ms-when-sync-empty: 0
    response-cache-update-interval-ms: 5000

# ── JWT (used by the embedded Gateway filter) ────────────────────────────────
jwt:
  secret: ${JWT_SECRET:your-super-secret-jwt-key-change-this-in-production}

# ── App meta (Notification service helpers) ──────────────────────────────────
app:
  admin-email: ${ADMIN_EMAIL:admin@entitykart.com}
  frontend-url: ${APP_URL:http://localhost:9901}

# ── Logging ──────────────────────────────────────────────────────────────────
logging:
  level:
    com.entitykart: DEBUG
    com.netflix.eureka: WARN
    com.netflix.discovery: WARN
    org.springframework.mail: DEBUG

# ── Management / Actuator ───────────────────────────────────────────────────
management:
  health:
    mail:
      enabled: false

