server:
  port: ${SERVER_PORT:9910}

spring:
  application:
    name: notification-service
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:defaultdb}?useSSL=true&requireSSL=true&trustServerCertificate=true
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:0721}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: notification-service-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: >
          com.entitykart.orderservice.dto,
          com.entitykart.paymentservice.dto,
          com.entitykart.returnservice.dto,
          com.entitykart.notificationservice.dto
        spring.json.use.type.headers: false
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
        connectiontimeout: 5000
        timeout: 3000
        writetimeout: 5000

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:9900/eureka/}
  instance:
    prefer-ip-address: true

app:
  admin-email: ${ADMIN_EMAIL:admin@entitykart.com}
  frontend-url: ${APP_URL:http://localhost:9901}

logging:
  level:
    com.entitykart: DEBUG
    org.springframework.mail: DEBUG
