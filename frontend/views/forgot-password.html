<div class="auth-container">
    <div class="card-glass auth-card">
        <div class="auth-header">
            <div class="auth-icon-ring">
                <i class="fa fa-key"></i>
            </div>
            <h2>Forgot Password?</h2>
            <p class="text-secondary">No worries — enter your email and we'll send you a reset link</p>
        </div>

        <!-- Success message after submission -->
        <div class="alert alert-success" ng-if="emailSent">
            <i class="fa fa-circle-check"></i>
            <span>Reset token sent! Check your inbox and proceed to reset your password.</span>
        </div>

        <form ng-submit="forgotPassword()" ng-if="!emailSent" novalidate>
            <div class="form-group">
                <label><i class="fa fa-envelope"></i> Registered Email</label>
                <input type="email" class="form-control" ng-model="forgotEmail"
                       placeholder="your@email.com" required autocomplete="email">
            </div>

            <button type="submit" class="btn btn-primary-gradient btn-block btn-lg">
                <i class="fa fa-paper-plane"></i> Send Reset Link
            </button>
        </form>

        <div ng-if="emailSent" style="margin-top: 1.5rem; display: flex; gap: 1rem;">
            <a href="#!/reset-password" class="btn btn-primary-gradient" style="flex:1; text-align:center;">
                <i class="fa fa-shield-check"></i> Enter Reset Token
            </a>
        </div>

        <p class="auth-footer-text">
            Remembered your password? <a href="#!/login" class="text-accent font-semibold">Sign In</a>
        </p>
    </div>
</div>
