<div class="auth-container" ng-init="initProfile()" style="padding: 2rem 1rem;">
    <div class="card-glass auth-card" style="max-width: 650px; width: 100%;">
        <div class="auth-header">
            <div class="auth-icon-ring">
                <i class="fa fa-user-pen"></i>
            </div>
            <h2>Account Settings</h2>
            <p class="text-secondary">Update your profile information, gender, contact number, password and avatar picture</p>
        </div>

        <!-- Alerts -->
        <div class="alert alert-error" ng-if="errorMessage" style="margin-bottom: 1.5rem;">
            <i class="fa fa-circle-exclamation"></i>
            <span>{{ errorMessage }}</span>
        </div>
        <div class="alert alert-success" ng-if="successMessage" style="margin-bottom: 1.5rem; background: rgba(16, 185, 129, 0.15); border-color: rgba(16, 185, 129, 0.3); color: #34d399;">
            <i class="fa fa-circle-check"></i>
            <span>{{ successMessage }}</span>
        </div>

        <form ng-submit="updateProfile()" novalidate>
            <!-- Avatar Upload Section -->
            <div style="display: flex; flex-direction: column; align-items: center; margin-bottom: 2rem; gap: 1rem;">
                <div style="position: relative; width: 100px; height: 100px; border-radius: 50%; border: 3px solid var(--color-accent); overflow: hidden; background: rgba(0,0,0,0.3); display: flex; justify-content: center; align-items: center;">
                    <img ng-src="{{ profileData.profilePicURL }}" ng-if="profileData.profilePicURL" style="width: 100%; height: 100%; object-fit: cover;">
                    <span style="font-size: 2.5rem; font-weight: bold; color: var(--color-accent);" ng-if="!profileData.profilePicURL">{{ profileData.name ? profileData.name.charAt(0).toUpperCase() : 'U' }}</span>
                    <div ng-if="isUploading" style="position: absolute; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.6); display: flex; justify-content: center; align-items: center;">
                        <i class="fa fa-spinner fa-spin" style="color: white; font-size: 1.5rem;"></i>
                    </div>
                </div>
                <div>
                    <label class="btn btn-secondary-glass btn-sm" style="cursor: pointer; display: inline-flex; align-items: center; gap: 0.5rem; padding: 0.5rem 1rem;">
                        <i class="fa fa-camera"></i> Change Photo
                        <input type="file" onchange="angular.element(this).scope().uploadProfilePic(this)" accept="image/*" style="display: none;">
                    </label>
                </div>
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                <div class="form-group">
                    <label><i class="fa fa-user"></i> Full Name</label>
                    <input type="text" class="form-control" ng-model="profileData.name" required>
                </div>

                <div class="form-group">
                    <label><i class="fa fa-envelope"></i> Email Address</label>
                    <input type="email" class="form-control" ng-model="profileData.email" readonly style="opacity: 0.6; cursor: not-allowed; background: rgba(255,255,255,0.03);">
                </div>
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-top: 1rem;">
                <div class="form-group">
                    <label><i class="fa fa-phone"></i> Contact Number</label>
                    <input type="text" class="form-control" ng-model="profileData.contactNum" placeholder="e.g. +91 9876543210">
                </div>

                <div class="form-group">
                    <label><i class="fa fa-venus-mars"></i> Gender</label>
                    <select class="form-control" ng-model="profileData.gender">
                        <option value="">Select Gender</option>
                        <option value="Male">Male</option>
                        <option value="Female">Female</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
            </div>

            <!-- Password field to change it -->
            <div class="form-group" style="margin-top: 1rem;">
                <label><i class="fa fa-lock"></i> Update Password</label>
                <div class="password-input-wrapper">
                    <input type="{{ showPassword ? 'text' : 'password' }}" class="form-control"
                           ng-model="profileData.password" placeholder="Leave blank to keep current password">
                    <button type="button" class="password-toggle" ng-click="showPassword = !showPassword">
                        <i class="fa" ng-class="showPassword ? 'fa-eye-slash' : 'fa-eye'"></i>
                    </button>
                </div>
            </div>

            <button type="submit" class="btn btn-primary-gradient btn-block btn-lg" style="margin-top: 2rem;">
                <i class="fa fa-save"></i> Save Changes
            </button>
        </form>
    </div>
</div>
