server:
  port: ${SERVER_PORT:9906}

spring:
  application:
    name: payment-service
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:defaultdb}?useSSL=true&requireSSL=true&trustServerCertificate=true
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:0721}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: payment-service-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      properties:
        spring.json.trusted.packages: com.entitykart.paymentservice.dto,com.entitykart.orderservice.dto
        spring.json.use.type.headers: false
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:9900/eureka/}
  instance:
    prefer-ip-address: true

authorize:
  net:
    api-login-id: ${AUTHORIZE_NET_API_LOGIN_ID:yourApiLoginId}
    transaction-key: ${AUTHORIZE_NET_TRANSACTION_KEY:yourTransactionKey}
    environment: ${AUTHORIZE_NET_ENVIRONMENT:sandbox}

logging:
  level:
    com.entitykart: DEBUG
