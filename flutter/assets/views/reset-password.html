<div class="auth-container">
    <div class="card-glass auth-card">
        <div class="auth-header">
            <div class="auth-icon-ring" style="background: linear-gradient(135deg, #10b981, #059669);">
                <i class="fa fa-shield-halved"></i>
            </div>
            <h2>Reset Password</h2>
            <p class="text-secondary">Enter the token from your email and set a new password</p>
        </div>

        <form ng-submit="resetPassword()" novalidate>
            <div class="form-group">
                <label><i class="fa fa-ticket"></i> Reset Token</label>
                <input type="text" class="form-control" ng-model="resetData.token"
                       placeholder="Paste your reset token here" required>
                <small class="text-secondary" style="margin-top: 0.4rem; display: block;">
                    <i class="fa fa-circle-info"></i> Check your email inbox for the reset token
                </small>
            </div>

            <div class="form-group">
                <label><i class="fa fa-lock"></i> New Password</label>
                <div class="password-input-wrapper">
                    <input type="{{ showPassword ? 'text' : 'password' }}" class="form-control"
                           ng-model="resetData.newPassword" placeholder="Min 6 characters" required
                           autocomplete="new-password">
                    <button type="button" class="password-toggle" ng-click="showPassword = !showPassword">
                        <i class="fa" ng-class="showPassword ? 'fa-eye-slash' : 'fa-eye'"></i>
                    </button>
                </div>
            </div>

            <div class="form-group">
                <label><i class="fa fa-lock"></i> Confirm New Password</label>
                <input type="password" class="form-control" ng-model="confirmPassword"
                       placeholder="Re-enter your new password" required autocomplete="new-password">
                <div class="text-error" ng-if="confirmPassword && resetData.newPassword !== confirmPassword" style="margin-top: 0.4rem; font-size: 0.85rem; color: #f87171;">
                    <i class="fa fa-triangle-exclamation"></i> Passwords do not match
                </div>
            </div>

            <button type="submit" class="btn btn-primary-gradient btn-block btn-lg"
                    ng-disabled="resetData.newPassword !== confirmPassword">
                <i class="fa fa-check-circle"></i> Reset Password
            </button>
        </form>

        <p class="auth-footer-text">
            Back to <a href="#!/login" class="text-accent font-semibold">Sign In</a>
        </p>
    </div>
</div>
