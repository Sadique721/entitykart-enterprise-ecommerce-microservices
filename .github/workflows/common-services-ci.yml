name: Common Services CI/CD

on:
  push:
    paths:
      - 'common-services/**'
      - '.github/workflows/common-services-ci.yml'
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.5

      - name: Build common-services (merged gateway + eureka + notification)
        working-directory: common-services
        run: gradle bootJar

      - name: Docker login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./common-services
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/common-services:latest
